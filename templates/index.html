<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Text Summarizer</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .container {
        width: 90%;
        max-width: 850px;
        background: white;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        animation: fadeIn 0.6s ease-in-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
        color: #333;
        font-weight: 700;
    }

    textarea {
        width: 100%;
        height: 180px;
        padding: 16px;
        border-radius: 14px;
        border: 1px solid #e2e8f0;
        background-color: #f8fafc;
        font-size: 15px;
        resize: none;
        outline: none;
        transition: all 0.3s;
        line-height: 1.6;
    }

    textarea:focus {
        border-color: #667eea;
        background-color: #fff;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .char-count {
        text-align: right;
        font-size: 12px;
        color: #94a3b8;
        margin-top: 8px;
    }

    button {
        width: 100%;
        margin-top: 20px;
        padding: 14px;
        border: none;
        border-radius: 14px;
        background: #667eea;
        color: white;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #5a67d8;
    }

    button:disabled {
        background: #cbd5e1;
        cursor: not-allowed;
    }

    .loader {
        display: none;
        text-align: center;
        margin-top: 20px;
        color: #64748b;
    }

    .spinner {
        border: 3px solid #f1f5f9;
        border-top: 3px solid #667eea;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 10px;
    }

    @keyframes spin {
        100% { transform: rotate(360deg); }
    }

    .output {
        margin-top: 35px;
        padding: 24px;
        background: #f1f5f9;
        border-radius: 16px;
        border-left: none;
    }

    .output h3 {
        margin-bottom: 12px;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: black;
    }

    .output p {
        line-height: 1.7;
        color: #334155;
        font-size: 16px;
    }

</style>
</head>

<body>

<div class="container">
    <h1>AI Text Summarizer</h1>

    <form id="form" action="/summarize" method="post">
        <textarea id="text" name="text" placeholder="Paste your conversation here...">{{ dialogue }}</textarea>
        <div class="char-count" id="charCount">0 characters</div>

        <button id="submitBtn" type="submit">Summarize</button>
    </form>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>Thinking...</p>
    </div>

    {% if summary %}
    <div class="output">
        <h3>Summary</h3>
        <p id="summaryText">{{ summary }}</p>
    </div>
    {% endif %}
</div>

<script>
    const textarea = document.getElementById("text");
    const charCount = document.getElementById("charCount");
    const form = document.getElementById("form");
    const loader = document.getElementById("loader");
    const btn = document.getElementById("submitBtn");

    function updateCharCount() {
        charCount.innerText = textarea.value.length + " characters";
    }

    updateCharCount();

    textarea.addEventListener("input", updateCharCount);

    form.addEventListener("submit", (e) => {
        if(textarea.value.trim().length > 0) {
            loader.style.display = "block";
            btn.style.display = "none"; 
        } else {
            e.preventDefault();
        }
    });
</script>

</body>
</html>
